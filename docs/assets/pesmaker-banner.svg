<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="520" viewBox="0 0 1600 520" role="img" aria-labelledby="title desc">
  <title id="title">PESMaker README banner</title>
  <desc id="desc">PESMaker title with a stylized potential energy surface, atomistic points, and workflow arrows.</desc>
  <defs>
    <linearGradient id="surfaceFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7a8"/>
      <stop offset="0.32" stop-color="#ffc83d"/>
      <stop offset="0.58" stop-color="#f05a28"/>
      <stop offset="0.82" stop-color="#6841a8"/>
      <stop offset="1" stop-color="#10439f"/>
    </linearGradient>
    <linearGradient id="blueTitle" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#2f38ff"/>
      <stop offset="1" stop-color="#0875d1"/>
    </linearGradient>
    <linearGradient id="cardFill" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#eef6ff"/>
    </linearGradient>
    <radialGradient id="atomBlue" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#f4fbff"/>
      <stop offset="0.35" stop-color="#5ab2ff"/>
      <stop offset="1" stop-color="#1257c7"/>
    </radialGradient>
    <radialGradient id="atomRed" cx="35%" cy="30%" r="70%">
      <stop offset="0" stop-color="#fff8ee"/>
      <stop offset="0.35" stop-color="#ffb349"/>
      <stop offset="1" stop-color="#de2c18"/>
    </radialGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#0f2a55" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="520" fill="#ffffff"/>
  <rect x="28" y="28" width="1544" height="464" rx="32" fill="url(#cardFill)" stroke="#d8e6f7"/>

  <g transform="translate(78 62)">
    <text x="0" y="76" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="72" font-weight="800" fill="url(#blueTitle)">PESMaker</text>
    <text x="4" y="124" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="28" font-weight="600" fill="#1d355d">Potential Energy Surface Maker</text>
    <text x="4" y="174" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="24" fill="#31466d">Structure generation -> sampling -> DFT labeling -> ML potential training</text>

    <g transform="translate(0 230)">
      <rect x="0" y="0" width="168" height="54" rx="12" fill="#eaf3ff" stroke="#b8d7ff"/>
      <text x="84" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#18468d">structures</text>
      <path d="M178 27 L238 27" stroke="#2a6bd6" stroke-width="5" stroke-linecap="round"/>
      <path d="M238 27 l-15 -10 v20 z" fill="#2a6bd6"/>

      <rect x="252" y="0" width="168" height="54" rx="12" fill="#eaf3ff" stroke="#b8d7ff"/>
      <text x="336" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#18468d">sampling</text>
      <path d="M430 27 L490 27" stroke="#2a6bd6" stroke-width="5" stroke-linecap="round"/>
      <path d="M490 27 l-15 -10 v20 z" fill="#2a6bd6"/>

      <rect x="504" y="0" width="168" height="54" rx="12" fill="#eaf3ff" stroke="#b8d7ff"/>
      <text x="588" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#18468d">labeling</text>
      <path d="M682 27 L742 27" stroke="#2a6bd6" stroke-width="5" stroke-linecap="round"/>
      <path d="M742 27 l-15 -10 v20 z" fill="#2a6bd6"/>

      <rect x="756" y="0" width="168" height="54" rx="12" fill="#eaf3ff" stroke="#b8d7ff"/>
      <text x="840" y="35" text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#18468d">training</text>
    </g>
  </g>

  <g transform="translate(770 70)" filter="url(#softShadow)">
    <path d="M34 268 C114 198 161 314 240 238 C314 166 371 260 450 198 C520 144 591 184 671 116 L671 342 C593 397 520 356 450 394 C372 438 314 356 240 424 C161 490 114 382 34 440 Z" fill="url(#surfaceFill)" opacity="0.96"/>
    <path d="M34 268 C114 198 161 314 240 238 C314 166 371 260 450 198 C520 144 591 184 671 116" fill="none" stroke="#0c2d73" stroke-width="5" opacity="0.78"/>
    <path d="M68 306 C143 252 182 351 259 284 C330 222 392 303 472 244 C537 196 596 220 646 168" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.65"/>
    <path d="M70 356 C147 306 189 399 266 338 C339 280 393 361 475 304 C540 258 590 280 650 230" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.55"/>
    <path d="M98 410 C171 358 216 446 291 386 C365 328 418 402 496 354 C552 319 601 330 648 292" fill="none" stroke="#ffffff" stroke-width="4" opacity="0.45"/>

    <g opacity="0.95">
      <circle cx="138" cy="286" r="16" fill="url(#atomBlue)" stroke="#173d85" stroke-width="3"/>
      <circle cx="202" cy="330" r="15" fill="url(#atomRed)" stroke="#7a260f" stroke-width="3"/>
      <circle cx="274" cy="260" r="16" fill="url(#atomBlue)" stroke="#173d85" stroke-width="3"/>
      <circle cx="356" cy="300" r="15" fill="url(#atomRed)" stroke="#7a260f" stroke-width="3"/>
      <circle cx="436" cy="230" r="16" fill="url(#atomBlue)" stroke="#173d85" stroke-width="3"/>
      <circle cx="514" cy="250" r="15" fill="url(#atomRed)" stroke="#7a260f" stroke-width="3"/>
      <circle cx="590" cy="184" r="16" fill="url(#atomBlue)" stroke="#173d85" stroke-width="3"/>
    </g>
  </g>

  <g transform="translate(1030 96)">
    <text x="0" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0c2d73">DFT labels</text>
    <text x="118" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0c2d73">+</text>
    <text x="146" y="0" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="23" font-weight="700" fill="#0c2d73">descriptor coverage</text>
    <path d="M24 28 C88 52 120 34 164 62 C213 94 258 72 326 110" fill="none" stroke="#2a6bd6" stroke-width="4" stroke-linecap="round" stroke-dasharray="9 9" opacity="0.8"/>
  </g>

  <g transform="translate(1090 360)">
    <rect x="0" y="0" width="390" height="72" rx="16" fill="#0b2c6d" opacity="0.94"/>
    <text x="28" y="30" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19" font-weight="700" fill="#ffffff">smart next</text>
    <text x="28" y="54" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="17" fill="#cfe7ff">plan first, dry-run submit, continue from artifacts</text>
  </g>
</svg>
